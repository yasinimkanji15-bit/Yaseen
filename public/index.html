<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS-TECH PAIRING</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b141a;
            color: #e9edef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #111b21;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222e35;
        }

        /* Catbox Logo Image Styling */
        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00a884;
            box-shadow: 0 0 15px rgba(0, 168, 132, 0.4);
        }

        h1 {
            color: #00a884;
            font-size: 24px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #8696a0;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: #8696a0;
            font-size: 12px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: #2a3942;
            border: 1px solid #2a3942;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: #00a884;
            background-color: #37464f;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #00a884;
            color: #111b21;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #008f72;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Pairing Code Display Section */
        .code-display {
            margin-top: 25px;
            padding: 15px;
            background-color: #202c33;
            border-radius: 8px;
            border: 1px dashed #00a884;
            display: none;
        }

        .code-title {
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 5px;
        }

        .code-value {
            font-size: 28px;
            font-weight: bold;
            color: #00a884;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Fetches your custom logo straight from Catbox -->
        <div class="logo-container">
            <img src="https://files.catbox.moe/038kef.jpg" alt="YAS-TECH">
        </div>

        <h1>YAS-TECH PAIRING</h1>
        <p>Enter your WhatsApp phone number along with your country code (e.g., 2557XXXXXXXX) to generate your pairing code.</p>

        <div class="input-group">
            <label for="phoneNumber">PHONE NUMBER</label>
            <input type="number" id="phoneNumber" placeholder="2557XXXXXXXX">
        </div>

        <button onclick="getPairingCode()">Generate Code</button>

        <!-- Hidden container that toggles visible when fetching code -->
        <div class="code-display" id="codeBox">
            <div class="code-title">YOUR PAIRING CODE:</div>
            <div class="code-value" id="pairCode">--------</div>
        </div>
    </div>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value.trim();
            const codeBox = document.getElementById('codeBox');
            const pairCode = document.getElementById('pairCode');

            if (!number) {
                alert('Please enter a valid phone number!');
                return;
            }

            pairCode.innerText = "LOADING...";
            codeBox.style.display = "block";

            try {
                // Requests pairing session directly from your backend instance
                const response = await fetch(`/code?number=${number}`);
                const data = await response.json();

                if (data.code) {
                    pairCode.innerText = data.code;
                } else {
                    pairCode.innerText = "ERROR";
                    alert('Failed to retrieve code. Please try again!');
                }
            } catch (error) {
                pairCode.innerText = "ERROR";
                alert('An error occurred connecting to the server!');
            }
        }
    </script>
</body>
</html>
